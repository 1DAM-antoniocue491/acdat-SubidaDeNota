<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Catálogo de Productos</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">
    <link rel="stylesheet" th:href="@{/css/materialize.min.css}" media="screen,projection" />
</head>
<body>

<div class="container">
    <div class="row">
        <a href="/" class="btn-large waves-effect waves-light orange">
            <i class="large material-icons">home</i>
            Volver al Dashboard
        </a>
    </div>

    <h2 class="center purple-text">Catálogo de Productos</h2>

    <div class="row">
        <div class="col s12 m6 l4" th:each="producto : ${productos}">
            <div class="card hoverable">
                <div class="card-content">
                    <span class="card-title grey-text" th:text="${producto.cod}"></span>
                    <h5 th:text="${producto.nombre}"></h5>
                    <p class="orange-text"><strong>Fabricante:</strong> <span th:text="${producto.fabricante}"></span></p>
                    <p class="grey-text"><span th:text="${producto.descripcion}"></span></p>
                </div>
                <div class="card-action">
                    <div class="row">
                        <div class="col s6">
                            <h6 class="green-text"><span th:text="${producto.precio}"></span> €</h6>
                        </div>
                        <div class="col s6 right-align">
                            <span class="badge grey" th:text="'Stock: ' + ${producto.unidades}"></span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script th:src="@{/js/materialize.min.js}"></script>
</body>
</html>
