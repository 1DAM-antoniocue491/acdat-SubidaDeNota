<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Lista de Tareas</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">
    <link rel="stylesheet" th:href="@{/css/materialize.min.css}" media="screen,projection" />
</head>
<body>

<div class="container">
    <h2 class="center blue-text">Gestión de Tareas</h2>

    <div class="row center">
        <a href="/" class="btn-large waves-effect waves-light orange">
            <i class="material-icons left">home</i>
            Volver al Dashboard
        </a>
        <a href="/tareas/nuevo" class="btn-large waves-effect waves-light green">
            <i class="material-icons left">add</i>
            Nueva Tarea
        </a>
    </div>

    <!-- Filtros -->
    <div class="row" style="margin-top: 30px;">
        <div class="col s12 m6">
            <h5 class="grey-text text-darken-2">Filtrar por Estado</h5>
            <div class="row">
                <a href="/tareas/"
                   class="btn waves-effect waves-light grey lighten-1"
                   th:classappend="${filtroEstado == null} ? 'orange' : ''">
                    Todas
                </a>
                <a href="/tareas/pendientes"
                   class="btn waves-effect waves-light orange lighten-2"
                   th:classappend="${filtroEstado == 'PENDIENTE'} ? 'orange darken-2' : ''">
                    Pendientes
                </a>
                <a href="/tareas/en-proceso"
                   class="btn waves-effect waves-light blue lighten-2"
                   th:classappend="${filtroEstado == 'EN_PROCESO'} ? 'blue darken-2' : ''">
                    En Proceso
                </a>
                <a href="/tareas/finalizadas"
                   class="btn waves-effect waves-light green lighten-2"
                   th:classappend="${filtroEstado == 'FINALIZADA'} ? 'green darken-2' : ''">
                    Finalizadas
                </a>
            </div>
        </div>

        <div class="col s12 m6">
            <h5 class="grey-text text-darken-2">Filtrar por Empleado</h5>
            <form th:action="@{/tareas/}" method="get">
                <select name="empleadoId" class="browser-default" onchange="this.form.submit()">
                    <option value="">Todos los empleados</option>
                    <option th:each="empleado : ${empleados}"
                            th:value="${empleado.id}"
                            th:text="${empleado.nombre}"
                            th:selected="${filtroEmpleadoId != null and filtroEmpleadoId == empleado.id}">
                    </option>
                </select>
            </form>
            <div th:if="${empleado != null}" class="card orange lighten-5">
                <div class="card-content">
                    <span class="card-title orange-text">
                        <i class="material-icons left">person</i>
                        <span th:text="${empleado.nombre}"></span>
                    </span>
                    <p class="grey-text">
                        Mostrando <strong th:text="${#lists.size(tareas)}"></strong> tarea(s)
                    </p>
                </div>
            </div>
        </div>
    </div>

    <div class="row" th:if="${#lists.isEmpty(tareas)}">
        <div class="col s12">
            <div class="card yellow lighten-4">
                <div class="card-content">
                    <p class="center black-text">No hay tareas registradas.</p>
                </div>
            </div>
        </div>
    </div>

    <div class="row" th:unless="${#lists.isEmpty(tareas)}">
        <table class="striped hoverable">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Título</th>
                    <th>Estado</th>
                    <th>Empleado Asignado</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="tarea : ${tareas}">
                    <td th:text="${tarea.id}"></td>
                    <td th:text="${tarea.titulo}"></td>
                    <td>
                        <span class="badge"
                              th:classappend="${tarea.estado.name() == 'PENDIENTE'} ? 'orange' :
                                              (${tarea.estado.name() == 'EN_PROCESO'} ? 'blue' : 'green')"
                              th:text="${tarea.estado}">
                        </span>
                    </td>
                    <td th:text="${tarea.empleado != null} ? ${tarea.empleado.nombre} : 'Sin asignar'"></td>
                    <td>
                        <a th:href="@{/tareas/editar/{id}(id=${tarea.id})}"
                           class="btn-small waves-effect waves-light blue">
                            <i class="material-icons left">edit</i>
                            Editar
                        </a>
                        <form th:action="@{/tareas/eliminar/{id}(id=${tarea.id})}"
                              method="post"
                              style="display: inline;"
                              onsubmit="return confirm('¿Estás seguro de eliminar esta tarea?')">
                            <button type="submit" class="btn-small waves-effect waves-light red">
                                <i class="material-icons left">delete</i>
                                Eliminar
                            </button>
                        </form>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</div>

<script th:src="@{/js/materialize.min.js}"></script>
</body>
</html>
