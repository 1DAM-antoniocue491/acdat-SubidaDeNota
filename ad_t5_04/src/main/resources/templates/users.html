<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Usuarios</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta charset="UTF-8" />

    <!-- Materialize CSS: https://materializecss.github.io -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">
    <link rel="stylesheet" href="css/materialize.min.css" media="screen,projection" />

    <script>
        $(document).ready(function(){
            $("#input_usuarios").on("keyup", function() {
                var value = $(this).val().toLowerCase();
                $("#tabla_usuarios tr").filter(function() {
                    $(this).toggle($(this).text().toLowerCase().indexOf(value) > -1)
                });
            });
        });
    </script>
</head>
<body>
<div class="row">
    <a href="/" class="btn-large waves-effect waves-light orange">
        <i class="large material-icons">home</i>
        Volver
    </a>
</div>
<div class="container">
    <h1 class="center">Listado de Usuarios</h1>

    <div class="row">
        <div class="input-field col s12">
            <i class="material-icons prefix">account_circle</i>
            <label for="input_usuarios">Término a buscar</label>
            <input id="input_usuarios" type="text">
        </div>
    </div>

    <table class="highlight">
        <thead>
            <tr>
                <th colspan="3">Total de usuarios: [[${cantidad}]]</th>
            </tr>
            <tr>
                <th>Usuario</th>
                <th>Nombre completo</th>
                <th>Email</th>
                <th>Eliminar</th>
            </tr>
        </thead>

        <tbody id="tabla_usuarios">
        <tr th:each="usuario : ${usuarios}">
            <td th:text="${usuario.nombreUsuario}"></td>
            <td th:text="${usuario.nombreCompleto}"></td>
            <td th:text="${usuario.email}"></td>
            <td>
                <form method="post" th:action="@{/registro/delete}" th:object="${usuario}">
                    <input type="hidden" th:field="*{nombreUsuario}" />
                    <button type="submit" class="btn-small waves-effect waves-light red">
                        <i class="material-icons">delete</i> Eliminar
                    </button>
                </form>
            </td>
        </tr>
        </tbody>
    </table>
</div>
<!-- Materialize JS -->
<script type="text/javascript" src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
<script type="text/javascript" src="js/materialize.min.js"></script>
<link rel="stylesheet" th:href="@{/css/materialize.min.css}" media="screen,projection" />

</body>
</html>
