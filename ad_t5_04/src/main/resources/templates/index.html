<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>User register</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta charset="UTF-8" />

    <!-- Materialize CSS: https://materializecss.github.io -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">
    <link rel="stylesheet" href="css/materialize.min.css" media="screen,projection" />

    <!-- Materialize JS: https://materializecss.github.io -->
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
    <script type="text/javascript" src="js/materialize.min.js"></script>
    <script>
        $(document).ready(function(){
            $('select').formSelect({});
         });
    </script>
</head>
<body>

<div class="container">
    <h1 class="center">Registro de usuario</h1>

    <form method="post" th:action="@{/registro}" th:object="${usuario}">

        <div class="row">
            <div class="input-field col s12">
                <i class="material-icons prefix">person</i>
                <label for="nombrecompleto">Nombre y Apellidos</label>
                <input type="text" id="nombrecompleto" th:field="*{nombreCompleto}"/>
            </div>
        </div>

        <div class="row">
            <div class="input-field col s6">
                <i class="material-icons prefix">account_circle</i>
                <label for="username">Nombre de usuario</label>
                <input type="text" id="username" th:field="*{nombreUsuario}"/>
            </div>

            <div class="input-field col s6">
                <i class="material-icons prefix">email</i>
                <label for="email">E-mail</label>
                <input type="text" id="email" th:field="*{email}"/>
            </div>
        </div>

        <div class="row">
            <div class="input-field col s12">
                <select id="role" th:field="*{role}">
                    <option value="" disabled selected>Seleccionar rol</option>
                    <option th:each="rol : ${roles}"
                            th:value="${rol}"
                            th:text="${rol}">
                    </option>
                </select>
                <label>Rol</label>
            </div>
        </div>

        <div class="row center">
            <div class="input-field col s12">
                <button type="submit" class="btn btn-default waves-effect waves-light">Registrar</button>
            </div>
        </div>
    </form>
</div>
</body>
</html>
