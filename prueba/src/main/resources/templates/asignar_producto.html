<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Asignar Producto</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">
    <link rel="stylesheet" th:href="@{/css/materialize.min.css}" media="screen,projection" />
</head>
<body>

<div class="container">
    <div class="row">
        <a th:href="@{/alumno/{nombre}/productos(nombre=${alumno.nombreUsuario})}"
           class="btn-large waves-effect waves-light orange">
            <i class="large material-icons">arrow_back</i>
            Volver
        </a>
    </div>

    <h2 class="center blue-text">
        Asignar Producto a <span th:text="${alumno.nombreCompleto}"></span>
    </h2>

    <div class="row" th:if="${#lists.isEmpty(productosDisponibles)}">
        <div class="col s12">
            <div class="card yellow lighten-4">
                <div class="card-content">
                    <p class="center black-text">No hay productos disponibles en el catálogo.</p>
                </div>
            </div>
        </div>
    </div>

    <div class="row">
        <form method="post" th:action="@{/producto/asignar/{nombre}(nombre=${alumno.nombreUsuario})}">
            <div class="input-field col s12">
                <select name="codProducto" required>
                    <option value="" disabled selected>Selecciona un producto</option>
                    <option th:each="prod : ${productosDisponibles}"
                            th:value="${prod.cod}"
                            th:text="${prod.nombre} + ' - ' + ${prod.fabricante} + ' (' + ${prod.precio} + '€)'">
                    </option>
                </select>
                <label>Producto del catálogo</label>
            </div>

            <div class="row center">
                <button type="submit" class="btn btn-large waves-effect waves-light green">
                    <i class="material-icons left">check</i>
                    Asignar Producto
                </button>
            </div>
        </form>
    </div>

    <div class="divider"></div>

    <h4 class="center">Productos ya asignados</h4>
    <div class="row" th:if="${#lists.isEmpty(alumno.productos)}">
        <p class="center grey-text">Este alumno aún no tiene productos asignados.</p>
    </div>
    <div class="row" th:unless="${#lists.isEmpty(alumno.productos)}">
        <div class="col s12 m6" th:each="producto : ${alumno.productos}">
            <div class="card green lighten-5">
                <div class="card-content">
                    <span class="card-title" th:text="${producto.cod}"></span>
                    <h5 th:text="${producto.nombre}"></h5>
                    <p class="orange-text" th:text="${producto.fabricante}"></p>
                    <p class="grey-text" th:text="${producto.descripcion}"></p>
                </div>
                <div class="card-action">
                    <h6 th:text="${producto.precio} + ' €'"></h6>
                </div>
            </div>
        </div>
    </div>
</div>

<script th:src="@{/js/materialize.min.js}"></script>
<script>
    $(document).ready(function(){
        $('select').formSelect();
    });
</script>
</body>
</html>
